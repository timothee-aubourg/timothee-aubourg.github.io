# Site Settings
locale                   : "en-GB"
title                    : ""
title_separator          : "-"
name                     : &name "Timothee Aubourg"
description              : &description "Postdoctoral Researcher in Digital Health AI & Multimodal Biomarkers | University of Oxford"
remote_theme: academicpages/academicpages.github.io
site_theme             : "default"
color_scheme           : "light"

url                      : "https://timothee-aubourg.github.io"
baseurl                  : ""
repository               : "timothee-aubourg/timothee-aubourg.github.io"

# SEO Related
google_scholar_stats_use_cdn : true

# Site Author — controls the sidebar
author:
  name             : *name
  avatar           : "profile.png"
  bio              : "Postdoctoral Researcher · Nuffield Dept. of Clinical Neurosciences, University of Oxford. AI & multimodal digital biomarkers for neurological disorders."
  location         : "Oxford, UK"
  employer         : "University of Oxford"
  googlescholar    : "https://scholar.google.com/citations?user=y9gR9AYAAAAJ"
  email            : "timothee.aubourg@ndcn.ox.ac.uk"
  github           : "timothee-aubourg"
  linkedin         : "timothee-aubourg"
  orcid            : "https://orcid.org/0000-0002-0151-6397"
  uri              :
  pubmed           :
  researchgate     :
  twitter          :

# Reading Files
include:
  - .htaccess
  - _pages

collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: false
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: false
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/London

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
whitelist:
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clipping: css
  comments: ["<!-- ", " -->"]
  endings: all
  ignore:
    envs: [development]
